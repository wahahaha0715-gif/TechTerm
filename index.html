
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TechTerm V4.2</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    body { background-color: #050505; color: #ecfeff; font-family: 'Courier New', monospace; }
    .progress-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.6); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Terminal: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>,
      Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"></path><path d="m21 2-9.6 9.6"></path><circle cx="7.5" cy="15.5" r="5.5"></circle></svg>,
      Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>,
      Refresh: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
      ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    };

    function App() {
      const [data, setData] = useState({ summaryBoard: "", newsItems: [] });
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [error, setError] = useState(null);
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      const [showKeySettings, setShowKeySettings] = useState(!localStorage.getItem('gemini_api_key'));

      useEffect(() => {
        let interval;
        if (loading) {
          setProgress(0);
          interval = setInterval(() => {
            setProgress(prev => (prev < 95 ? prev + Math.random() * 10 : prev));
          }, 400);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [loading]);

      // 關鍵修復：手動開啟外部連結
      const handleOpenLink = (url) => {
        if (!url) return;
        // 嘗試使用 window.open，這在大多數 APK 容器中會觸發系統瀏覽器
        window.open(url, '_blank', 'noopener,noreferrer');
      };

      const fetchTechNews = async () => {
        if (!apiKey) { setShowKeySettings(true); return; }
        setLoading(true); setError(null);
        localStorage.setItem('gemini_api_key', apiKey);

        try {
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          const currentDateTime = new Date().toLocaleString('zh-TW');

          const promptText = `
            Current Time: ${currentDateTime}.
            Task: Find 10-12 latest smartphone leaks/news from the PAST 20 HOURS.
            Return strictly JSON:
            {
              "summaryBoard": "100-word ZH brief.",
              "newsItems": [
                {
                  "brand": "Brand",
                  "titleZh": "中標",
                  "titleEn": "EN Title",
                  "summary": "ZH\\nEN",
                  "source": "Site",
                  "time": "X hours ago",
                  "url": "COMPLETE URL",
                  "score": 95
                }
              ]
            }
          `;

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }],
              tools: [{ google_search: {} }]
            })
          });

          const resData = await response.json();
          let text = resData.candidates?.[0]?.content?.parts?.[0]?.text || "";
          text = text.replace(/```json/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(text);
          setData(parsed);
          setProgress(100);
        } catch (err) {
          setError("掃描錯誤，請檢查網路或金鑰。");
        } finally {
          setTimeout(() => setLoading(false), 500);
        }
      };

      return (
        <div className="p-4 sm:p-6 max-w-2xl mx-auto pb-20">
          <div className="flex justify-between items-center mb-6 text-[10px] text-cyan-600 font-bold border-b border-cyan-900/30 pb-2">
            <span className="flex items-center gap-2"><Icons.Terminal /> TECH_TERM_V4.2</span>
            <button onClick={() => setShowKeySettings(!showKeySettings)} className="uppercase">
              [ {apiKey ? 'Key_Active' : 'Key_Missing'} ]
            </button>
          </div>

          {showKeySettings && (
            <div className="mb-6 p-4 border border-cyan-800 bg-[#0a0c10]">
              <input 
                type="password" 
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="AIzaSy..." 
                className="bg-black border border-cyan-900 text-cyan-300 px-4 py-3 text-sm w-full mb-3 focus:outline-none"
              />
              <button onClick={() => {localStorage.setItem('gemini_api_key', apiKey); setShowKeySettings(false);}} className="w-full bg-cyan-900/50 text-cyan-300 py-2 text-xs border border-cyan-800 uppercase font-bold">Save Config</button>
            </div>
          )}

          <header className="mb-8 border-l-4 border-cyan-500 pl-4">
            <h1 className="text-4xl font-black text-cyan-400 uppercase tracking-tighter">Mobile Terminal</h1>
            <button 
              onClick={fetchTechNews}
              disabled={loading}
              className={`mt-6 py-4 w-full text-sm font-bold border-2 transition-all ${loading ? 'bg-gray-900 border-gray-800 text-gray-700' : 'bg-cyan-950/20 border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black'}`}
            >
              {loading ? 'ANALYZING...' : 'EXECUTE SCAN'}
            </button>
          </header>

          {loading && (
            <div className="mb-8">
              <div className="w-full h-2 bg-gray-900 border border-cyan-900">
                <div className="h-full bg-cyan-500 progress-glow transition-all duration-300" style={{ width: `${progress}%` }}></div>
              </div>
            </div>
          )}

          {data.summaryBoard && !loading && (
            <div className="mb-10 bg-cyan-950/10 border-2 border-dashed border-cyan-800 p-5 mt-4">
              <p className="text-gray-200 text-sm leading-relaxed">{data.summaryBoard}</p>
            </div>
          )}

          <div className="grid gap-8">
            {data.newsItems.map((item, index) => (
              <article key={index} className="border-b border-gray-800 pb-8">
                <div className="flex gap-2 mb-3 text-[10px] font-bold uppercase">
                  <span className="bg-white text-black px-2 py-0.5">{item.brand}</span>
                  <span className="border border-cyan-800 text-cyan-500 px-2 py-0.5">{item.time}</span>
                  <span className="text-gray-600 ml-auto">{item.source}</span>
                </div>
                <h2 className="text-lg font-bold text-gray-100 mb-1">{item.titleZh}</h2>
                <h3 className="text-[10px] text-cyan-900 font-bold mb-4 uppercase">{item.titleEn}</h3>
                <div className="text-sm text-gray-400 mb-4 whitespace-pre-line leading-relaxed font-sans">{item.summary}</div>
                
                {/* 修改點：改用 onClick 觸發函數 */}
                <button 
                  onClick={() => handleOpenLink(item.url)}
                  className="inline-flex items-center gap-2 text-xs font-bold text-cyan-400 border border-cyan-900 px-4 py-2 hover:bg-cyan-400 hover:text-black transition-all"
                >
                  ACCESS SOURCE <Icons.ExternalLink />
                </button>
              </article>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
