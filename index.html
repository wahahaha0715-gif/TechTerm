<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TechTerm V5.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    *{box-sizing:border-box;}
    body{background:#050505;color:#ecfeff;font-family:'Courier New',monospace;margin:0;}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes scanline{0%{top:-2px}100%{top:100vh}}
    @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .scanline{position:fixed;left:0;right:0;height:2px;top:0;background:linear-gradient(transparent,rgba(34,211,238,0.15),transparent);animation:scanline 6s linear infinite;pointer-events:none;z-index:9999;}
    .spin{animation:spin 1s linear infinite;}
    .fadein{animation:fadein 0.35s ease both;}
    .glow{box-shadow:0 0 12px rgba(34,211,238,0.5);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:#164e63;}
  </style>
</head>
<body>
<div class="scanline"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Icons ─────────────────────────────────────────────── */
const IcoTerm    = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;
const IcoLink    = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
const IcoRefresh = ({spin}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={spin?'spin':''}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
const IcoKey     = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;

/* ─── Cache (25 min) ────────────────────────────────────── */
const CK = 'tt_v51';
const TTL = 25 * 60 * 1000;
const saveCache = (d) => { try { localStorage.setItem(CK, JSON.stringify({ts:Date.now(),d})); } catch(_){} };
const loadCache = () => {
  try {
    const r = localStorage.getItem(CK);
    if (!r) return null;
    const {ts,d} = JSON.parse(r);
    if (Date.now()-ts < TTL) return {d,ts};
    localStorage.removeItem(CK);
  } catch(_) {}
  return null;
};

/* ─── Open URL (WebIntoApp safe) ────────────────────────── */
function openLink(url) {
  if (!url || !url.startsWith('http')) return;
  try {
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    return;
  } catch(_) {}
  try { window.open(url, '_blank'); } catch(_) {}
}

/* ─── Single Gemini call ────────────────────────────────── */
async function gemini(apiKey, prompt, useSearch) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { temperature: 0.25, maxOutputTokens: 6000 }
  };
  if (useSearch) body.tools = [{ google_search: {} }];

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    const msg = e?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }

  const data = await res.json();
  // Extract text from all parts (Gemini sometimes splits into multiple parts)
  const parts = data?.candidates?.[0]?.content?.parts || [];
  let text = parts.map(p => p.text || '').join('');
  // Strip markdown fences if present
  text = text.replace(/```json[\s\S]*?```/g, m => m.slice(7, -3))
             .replace(/```[\s\S]*?```/g, m => m.slice(3, -3))
             .trim();
  return text;
}

/* ─── Parse JSON safely ─────────────────────────────────── */
function parseNews(text) {
  // Try to find JSON object
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) return [];
  try {
    const obj = JSON.parse(match[0]);
    return Array.isArray(obj.newsItems) ? obj.newsItems : [];
  } catch(_) {
    // Try to fix truncated JSON by closing brackets
    try {
      const fixed = match[0].replace(/,\s*$/, '') + ']}';
      const obj = JSON.parse(fixed);
      return Array.isArray(obj.newsItems) ? obj.newsItems : [];
    } catch(_) { return []; }
  }
}

/* ─── Main news fetcher (sequential, crash-safe) ────────── */
async function fetchNews(apiKey, onStatus) {
  const now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });

  onStatus('第一批搜尋中... (1/3)');

  // Batch 1 — with Google Search
  const p1 = `現在台灣時間：${now}。
你是科技新聞編輯。用 Google Search 搜尋過去 24 小時內手機、平板、穿戴裝置相關最新消息。

規定：
- 所有中文【必須是繁體中文】，禁止簡體字
- 品牌型號保留英文（如 Samsung Galaxy S25）

回傳 10 筆，純 JSON，禁止加 markdown 符號：
{"newsItems":[{"brand":"英文品牌","titleZh":"繁體中文標題","titleEn":"English subtitle","summary":"繁體摘要2句\\n英文1句","source":"來源網站","time":"X小時前","url":"https://完整網址","score":85}]}

url 必須是完整 https 網址。score 是熱度 0-100。`;

  const t1 = await gemini(apiKey, p1, true);
  const items1 = parseNews(t1);

  onStatus(`已取得 ${items1.length} 則，繼續搜尋第二批... (2/3)`);

  // Wait 2s to respect free-tier rate limit (15 RPM)
  await new Promise(r => setTimeout(r, 2000));

  // Batch 2
  const usedTitles = items1.map(n => n.titleZh).join('、');
  const p2 = `現在台灣時間：${now}。
你是科技新聞編輯。用 Google Search 搜尋過去 24 小時內手機、平板、穿戴裝置相關最新消息。
已有以下新聞，請找不重複的：${usedTitles || '無'}

規定：
- 所有中文【必須是繁體中文】，禁止簡體字
- 品牌型號保留英文

回傳 10 筆不重複新聞，純 JSON，禁止加 markdown：
{"newsItems":[{"brand":"英文品牌","titleZh":"繁體中文標題","titleEn":"English subtitle","summary":"繁體摘要2句\\n英文1句","source":"來源網站","time":"X小時前","url":"https://完整網址","score":75}]}`;

  let items2 = [];
  try {
    const t2 = await gemini(apiKey, p2, true);
    items2 = parseNews(t2);
  } catch(e) {
    console.warn('Batch 2 failed:', e.message);
    // Continue with just batch 1
  }

  onStatus('整理摘要中... (3/3)');
  await new Promise(r => setTimeout(r, 1000));

  // Merge & deduplicate
  const seen = new Set();
  const all = [...items1, ...items2].filter(item => {
    const key = (item.titleZh || item.titleEn || '').trim();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  }).sort((a, b) => (b.score || 0) - (a.score || 0));

  // Summary (no search = fast, no rate limit issue)
  let summaryBoard = '';
  if (all.length > 0) {
    const heads = all.slice(0, 8).map(n => n.titleZh).join('；');
    const sp = `根據以下新聞標題，用【繁體中文】寫 100 字以內的科技新聞今日重點摘要，直接輸出純文字，不加任何標題符號：\n${heads}`;
    try {
      summaryBoard = (await gemini(apiKey, sp, false)).trim();
    } catch(_) {}
  }

  return { summaryBoard, newsItems: all };
}

/* ─── Score bar ─────────────────────────────────────────── */
function ScoreBar({ score }) {
  const s = Math.max(0, Math.min(100, score || 0));
  const c = s >= 80 ? '#22d3ee' : s >= 55 ? '#67e8f9' : '#164e63';
  return (
    <div className="flex items-center gap-2 my-2">
      <div className="flex-1 h-px bg-gray-800">
        <div style={{ width:`${s}%`, background:c, height:'1px' }} />
      </div>
      <span style={{ color:c, fontSize:9, fontWeight:700 }}>HOT {s}</span>
    </div>
  );
}

/* ─── App ───────────────────────────────────────────────── */
function App() {
  const [news, setNews]         = useState({ summaryBoard:'', newsItems:[] });
  const [loading, setLoading]   = useState(false);
  const [progress, setProgress] = useState(0);
  const [status, setStatus]     = useState('');
  const [error, setError]       = useState('');
  const [lastUp, setLastUp]     = useState(null);
  const [showKey, setShowKey]   = useState(false);
  const [keyInput, setKeyInput] = useState('');
  const [apiKey, setApiKey]     = useState('');
  const fetched = useRef(false);

  // Load key
  useEffect(() => {
    const k = localStorage.getItem('gemini_key') || '';
    setApiKey(k); setKeyInput(k);
  }, []);

  // Progress ticker
  useEffect(() => {
    let iv;
    if (loading) {
      setProgress(5);
      iv = setInterval(() => setProgress(p => p < 80 ? p + (80-p)*0.03 : p), 500);
    }
    return () => clearInterval(iv);
  }, [loading]);

  // Auto-fetch on mount
  useEffect(() => {
    if (fetched.current) return;
    const k = localStorage.getItem('gemini_key') || '';
    if (!k) { setShowKey(true); return; }
    fetched.current = true;
    const cached = loadCache();
    if (cached) { setNews(cached.d); setLastUp(new Date(cached.ts)); return; }
    runFetch(k);
  // eslint-disable-next-line
  }, []);

  const runFetch = async (key) => {
    const k = (key || apiKey || '').trim();
    if (!k) { setShowKey(true); return; }
    setLoading(true); setError(''); setStatus('');
    try {
      const result = await fetchNews(k, setStatus);
      setNews(result);
      saveCache(result);
      setLastUp(new Date());
      setProgress(100);
    } catch(e) {
      const msg = e.message || '';
      if (msg.includes('API_KEY') || msg.includes('400') || msg.includes('key')) {
        setError('API 金鑰無效，請重新確認後儲存。');
        setShowKey(true);
      } else if (msg.includes('429') || msg.includes('quota')) {
        setError('已達免費版使用上限，請稍後幾分鐘再試。');
      } else {
        setError('搜尋失敗：' + msg.slice(0, 80));
      }
    } finally {
      setStatus('');
      setTimeout(() => setLoading(false), 300);
    }
  };

  const saveKey = () => {
    const k = keyInput.trim();
    if (!k) return;
    localStorage.setItem('gemini_key', k);
    setApiKey(k);
    setShowKey(false);
    setError('');
    if (!news.newsItems.length) runFetch(k);
  };

  const fmt = d => d ? d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '';

  return (
    <div className="p-4 max-w-xl mx-auto pb-24">

      {/* Top bar */}
      <div className="flex justify-between items-center mb-5 text-[10px] font-bold border-b border-cyan-900/25 pb-2">
        <span className="flex items-center gap-2 text-cyan-500"><IcoTerm/> TECH_TERM_V5.1</span>
        <button onClick={() => setShowKey(!showKey)}
          className="flex items-center gap-1.5 hover:text-cyan-300 transition-colors">
          <IcoKey/>
          <span className={apiKey ? 'text-cyan-700' : 'text-red-500'}>
            {apiKey ? 'KEY_OK' : 'KEY_MISSING'}
          </span>
        </button>
      </div>

      {/* Key panel */}
      {showKey && (
        <div className="mb-6 p-4 border border-cyan-800 bg-[#080c10] fadein">
          <p className="text-[10px] text-cyan-700 mb-1 uppercase tracking-widest">Gemini API Key</p>
          <p className="text-[9px] text-gray-600 mb-3">免費版：<span className="text-cyan-900">aistudio.google.com/apikey</span></p>
          <input
            type="password"
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            onKeyDown={e => e.key==='Enter' && saveKey()}
            placeholder="AIzaSy..."
            className="bg-black border border-cyan-900 text-cyan-300 px-3 py-3 text-sm w-full mb-3 focus:outline-none focus:border-cyan-600"
          />
          <button onClick={saveKey}
            className="w-full bg-cyan-900/40 text-cyan-300 py-2.5 text-xs border border-cyan-800 uppercase font-bold hover:bg-cyan-800/50 transition-colors">
            儲存並開始掃描
          </button>
        </div>
      )}

      {/* Hero */}
      <header className="mb-6 border-l-4 border-cyan-500 pl-4">
        <h1 className="text-3xl font-black text-cyan-400 uppercase tracking-tighter">Mobile Terminal</h1>
        <p className="text-[10px] text-cyan-900 mt-0.5 uppercase tracking-widest">手機科技情報站 · 繁體中文</p>
        <div className="flex gap-3 mt-4 items-center">
          <button onClick={() => runFetch()} disabled={loading}
            className={`flex items-center gap-2 px-5 py-3 text-xs font-bold border-2 transition-all
              ${loading
                ? 'border-gray-800 text-gray-700 cursor-not-allowed'
                : 'border-cyan-600 text-cyan-400 hover:bg-cyan-600 hover:text-black'}`}>
            <IcoRefresh spin={loading}/>
            {loading ? '掃描中...' : '重新掃描'}
          </button>
          {lastUp && !loading && (
            <span className="text-[10px] text-cyan-900 border border-cyan-900/30 px-3 py-2">
              更新 {fmt(lastUp)}
            </span>
          )}
        </div>
      </header>

      {/* Progress */}
      {loading && (
        <div className="mb-6 fadein">
          <div className="flex justify-between text-[9px] text-cyan-900 mb-1">
            <span>{status || '初始化...'}</span>
            <span>{Math.round(progress)}%</span>
          </div>
          <div className="w-full h-1 bg-gray-900">
            <div className="h-full bg-cyan-500 glow transition-all duration-500" style={{width:`${progress}%`}}/>
          </div>
          <p className="text-[9px] text-gray-800 mt-1">分批搜尋，免費版約需 40-80 秒</p>
        </div>
      )}

      {/* Error */}
      {error && (
        <div className="mb-5 border border-red-900 bg-red-950/20 px-4 py-3 text-xs text-red-400 fadein">
          ⚠ {error}
        </div>
      )}

      {/* Summary */}
      {news.summaryBoard && !loading && (
        <div className="mb-7 bg-cyan-950/10 border border-dashed border-cyan-900/40 p-4 fadein">
          <p className="text-[9px] text-cyan-800 uppercase tracking-widest mb-2">今日重點摘要</p>
          <p className="text-gray-300 text-sm leading-relaxed font-sans">{news.summaryBoard}</p>
        </div>
      )}

      {/* Count */}
      {news.newsItems.length > 0 && !loading && (
        <div className="mb-4 text-[10px] text-cyan-900 uppercase tracking-wider">
          共 <span className="text-cyan-500 font-bold">{news.newsItems.length}</span> 則 · 依熱度排序
        </div>
      )}

      {/* News */}
      <div className="grid gap-7">
        {news.newsItems.map((item, i) => (
          <article key={i} className="border-b border-gray-800/40 pb-7 fadein"
            style={{ animationDelay:`${Math.min(i*0.03,0.6)}s` }}>
            <div className="flex flex-wrap gap-1.5 mb-2 items-center">
              <span className="bg-white text-black text-[10px] font-black px-2 py-0.5 uppercase">{item.brand||'—'}</span>
              <span className="border border-cyan-800 text-cyan-700 text-[10px] px-2 py-0.5">{item.time}</span>
              <span className="text-gray-700 text-[9px] ml-auto truncate max-w-[120px]">{item.source}</span>
            </div>
            <h2 className="text-base font-bold text-gray-100 leading-snug mb-0.5">{item.titleZh}</h2>
            <h3 className="text-[9px] text-cyan-900 font-bold uppercase tracking-wide">{item.titleEn}</h3>
            <ScoreBar score={item.score}/>
            <p className="text-sm text-gray-400 whitespace-pre-line leading-relaxed font-sans mb-4">{item.summary}</p>
            <button onClick={() => openLink(item.url)}
              className="inline-flex items-center gap-2 text-[11px] font-bold text-cyan-600 border border-cyan-900 px-4 py-2 hover:bg-cyan-600 hover:text-black transition-all active:scale-95">
              查看原文 <IcoLink/>
            </button>
          </article>
        ))}
      </div>

      {/* Empty */}
      {!loading && news.newsItems.length===0 && !error && (
        <div className="text-center py-24 text-cyan-900 text-xs uppercase tracking-widest">
          {apiKey ? '尚無資料，點擊重新掃描' : '請先設定 Gemini API 金鑰'}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
