<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TechTerm V6</title>
<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#050505;color:#ecfeff;font-family:'Courier New',Courier,monospace;min-height:100vh;}

  /* Scanline */
  #scanline{position:fixed;left:0;right:0;height:2px;top:-2px;
    background:linear-gradient(transparent,rgba(34,211,238,.18),transparent);
    animation:scan 6s linear infinite;pointer-events:none;z-index:9999;}
  @keyframes scan{0%{top:-2px}100%{top:100vh}}

  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .fadein{animation:fadein .35s ease both;}

  /* Layout */
  #app{max-width:520px;margin:0 auto;padding:16px 16px 96px;}

  /* Top bar */
  #topbar{display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(34,211,238,.12);padding-bottom:8px;margin-bottom:20px;
    font-size:10px;font-weight:700;letter-spacing:.05em;}
  #topbar .logo{display:flex;align-items:center;gap:6px;color:#22d3ee;}
  #keyBtn{background:none;border:none;color:#164e63;cursor:pointer;font-family:inherit;
    font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px;padding:4px 6px;}
  #keyBtn.ok{color:#0e7490;}
  #keyBtn.bad{color:#ef4444;}

  /* Key panel */
  #keyPanel{display:none;margin-bottom:20px;padding:16px;border:1px solid #155e75;background:#080c10;}
  #keyPanel p{font-size:10px;color:#0e7490;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
  #keyPanel small{font-size:9px;color:#374151;display:block;margin-bottom:12px;}
  #keyInput{width:100%;background:#000;border:1px solid #155e75;color:#67e8f9;
    padding:12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;}
  #keyInput:focus{border-color:#22d3ee;}
  #saveBtn{width:100%;background:rgba(14,116,144,.3);border:1px solid #155e75;
    color:#67e8f9;padding:10px;font-size:11px;font-family:inherit;font-weight:700;
    text-transform:uppercase;cursor:pointer;letter-spacing:.08em;}
  #saveBtn:hover{background:rgba(14,116,144,.5);}

  /* Hero */
  #hero{border-left:4px solid #22d3ee;padding-left:16px;margin-bottom:24px;}
  #hero h1{font-size:28px;font-weight:900;color:#22d3ee;text-transform:uppercase;letter-spacing:-.03em;line-height:1;}
  #hero p{font-size:9px;color:#164e63;text-transform:uppercase;letter-spacing:.15em;margin-top:4px;}
  #heroRow{display:flex;gap:10px;align-items:center;margin-top:16px;}
  #scanBtn{display:flex;align-items:center;gap:8px;padding:12px 20px;
    font-size:11px;font-weight:700;font-family:inherit;text-transform:uppercase;
    border:2px solid #0e7490;color:#22d3ee;background:rgba(8,70,92,.15);cursor:pointer;transition:.2s;}
  #scanBtn:hover:not(:disabled){background:#22d3ee;color:#000;}
  #scanBtn:disabled{border-color:#1f2937;color:#374151;cursor:not-allowed;}
  #scanBtn svg{flex-shrink:0;}
  #lastUp{font-size:10px;color:#164e63;border:1px solid rgba(34,211,238,.1);padding:8px 12px;}

  /* Progress */
  #progressBox{display:none;margin-bottom:24px;}
  #progressRow{display:flex;justify-content:space-between;font-size:9px;color:#164e63;margin-bottom:6px;}
  #progressBar{width:100%;height:4px;background:#111;position:relative;overflow:hidden;}
  #progressFill{height:100%;background:#22d3ee;width:0%;transition:width .5s ease;
    box-shadow:0 0 10px rgba(34,211,238,.5);}
  #progressHint{font-size:9px;color:#1f2937;margin-top:6px;}

  /* Error */
  #errorBox{display:none;margin-bottom:20px;border:1px solid #7f1d1d;
    background:rgba(127,29,29,.1);padding:12px 16px;font-size:12px;color:#f87171;}

  /* Summary */
  #summaryBox{display:none;margin-bottom:28px;border:1px dashed rgba(34,211,238,.2);
    background:rgba(8,70,92,.06);padding:16px;}
  #summaryBox .label{font-size:9px;color:#164e63;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
  #summaryText{font-size:14px;color:#d1d5db;line-height:1.7;font-family:system-ui,sans-serif;}

  /* Count */
  #countBadge{display:none;font-size:10px;color:#164e63;text-transform:uppercase;
    letter-spacing:.08em;margin-bottom:16px;}
  #countBadge span{color:#22d3ee;font-weight:700;}

  /* News list */
  #newsList{display:grid;gap:28px;}
  .card{border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:28px;}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;}
  .brand{background:#fff;color:#000;font-size:9px;font-weight:900;
    padding:2px 6px;text-transform:uppercase;letter-spacing:.05em;}
  .time{border:1px solid #155e75;color:#0e7490;font-size:9px;padding:2px 6px;}
  .src{font-size:9px;color:#374151;margin-left:auto;max-width:120px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .titleZh{font-size:15px;font-weight:700;color:#f3f4f6;line-height:1.35;margin-bottom:2px;}
  .titleEn{font-size:9px;color:#164e63;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
  .hotrow{display:flex;align-items:center;gap:8px;margin:8px 0 12px;}
  .hotbar{flex:1;height:1px;background:#111;overflow:hidden;}
  .hotfill{height:1px;}
  .hotscore{font-size:9px;font-weight:700;}
  .summary{font-size:13px;color:#9ca3af;line-height:1.65;white-space:pre-line;
    font-family:system-ui,sans-serif;margin-bottom:14px;}
  .linkBtn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
    color:#0e7490;border:1px solid #155e75;padding:8px 16px;background:none;
    font-family:inherit;cursor:pointer;transition:.2s;text-decoration:none;}
  .linkBtn:hover,.linkBtn:active{background:#22d3ee;color:#000;border-color:#22d3ee;}

  /* Empty */
  #empty{display:none;text-align:center;padding:80px 0;font-size:11px;
    color:#164e63;text-transform:uppercase;letter-spacing:.15em;}

  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:#164e63;}
</style>
</head>
<body>
<div id="scanline"></div>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      TECH_TERM_V6
    </div>
    <button id="keyBtn" class="bad" onclick="toggleKeyPanel()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>
      <span id="keyLabel">KEY_MISSING</span>
    </button>
  </div>

  <!-- Key panel -->
  <div id="keyPanel">
    <p>Gemini API Key</p>
    <small>免費版取得：aistudio.google.com/apikey</small>
    <input id="keyInput" type="password" placeholder="AIzaSy..." autocomplete="off">
    <button id="saveBtn" onclick="saveKey()">儲存並開始掃描</button>
  </div>

  <!-- Hero -->
  <div id="hero">
    <h1>Mobile Terminal</h1>
    <p>手機科技情報站 · 繁體中文</p>
    <div id="heroRow">
      <button id="scanBtn" onclick="startScan()">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span id="scanLabel">重新掃描</span>
      </button>
      <div id="lastUp" style="display:none;"></div>
    </div>
  </div>

  <!-- Progress -->
  <div id="progressBox">
    <div id="progressRow">
      <span id="progressMsg">初始化...</span>
      <span id="progressPct">0%</span>
    </div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressHint">分批搜尋中，免費版約需 40-90 秒</div>
  </div>

  <!-- Error -->
  <div id="errorBox"></div>

  <!-- Summary -->
  <div id="summaryBox">
    <div class="label">今日重點摘要</div>
    <div id="summaryText"></div>
  </div>

  <!-- Count -->
  <div id="countBadge"></div>

  <!-- News list -->
  <div id="newsList"></div>

  <!-- Empty -->
  <div id="empty">尚無資料，點擊重新掃描</div>

</div>

<script>
/* ── State ──────────────────────────────────────────── */
var apiKey = '';
var isLoading = false;
var progressVal = 0;
var progressTimer = null;

/* ── Init ───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', function() {
  var k = localStorage.getItem('gemini_key') || '';
  apiKey = k;
  document.getElementById('keyInput').value = k;
  updateKeyUI();

  if (!k) {
    showKeyPanel(true);
    showEmpty();
    return;
  }

  // Try cache first
  var cached = loadCache();
  if (cached) {
    renderData(cached.d);
    var t = new Date(cached.ts);
    showLastUpdate(t);
    return;
  }

  // Auto-fetch
  startScan();
});

/* ── Key UI ─────────────────────────────────────────── */
function updateKeyUI() {
  var btn = document.getElementById('keyBtn');
  var lbl = document.getElementById('keyLabel');
  if (apiKey) {
    btn.className = 'ok';
    lbl.textContent = 'KEY_OK';
  } else {
    btn.className = 'bad';
    lbl.textContent = 'KEY_MISSING';
  }
}

function toggleKeyPanel() {
  var p = document.getElementById('keyPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function showKeyPanel(show) {
  document.getElementById('keyPanel').style.display = show ? 'block' : 'none';
}

function saveKey() {
  var val = document.getElementById('keyInput').value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem('gemini_key', val);
  updateKeyUI();
  showKeyPanel(false);
  showError('');
  if (document.getElementById('newsList').children.length === 0) {
    startScan();
  }
}

/* ── Progress ───────────────────────────────────────── */
function setProgress(pct, msg) {
  progressVal = pct;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  if (msg) document.getElementById('progressMsg').textContent = msg;
}

function startProgressTick() {
  clearInterval(progressTimer);
  progressTimer = setInterval(function() {
    if (progressVal < 80) {
      progressVal += (80 - progressVal) * 0.03;
      document.getElementById('progressFill').style.width = progressVal + '%';
      document.getElementById('progressPct').textContent = Math.round(progressVal) + '%';
    }
  }, 500);
}

function stopProgressTick() {
  clearInterval(progressTimer);
}

/* ── Show/hide helpers ──────────────────────────────── */
function showLoading(on) {
  document.getElementById('progressBox').style.display = on ? 'block' : 'none';
  var btn = document.getElementById('scanBtn');
  var icon = document.getElementById('refreshIcon');
  var lbl = document.getElementById('scanLabel');
  btn.disabled = on;
  icon.style.animation = on ? 'spin 1s linear infinite' : '';
  lbl.textContent = on ? '掃描中...' : '重新掃描';
}

function showError(msg) {
  var el = document.getElementById('errorBox');
  if (msg) { el.textContent = '⚠ ' + msg; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

function showLastUpdate(d) {
  var el = document.getElementById('lastUp');
  var h = ('0'+d.getHours()).slice(-2);
  var m = ('0'+d.getMinutes()).slice(-2);
  el.textContent = '更新 ' + h + ':' + m;
  el.style.display = 'block';
}

function showEmpty() {
  document.getElementById('empty').style.display = 'block';
}

/* ── Cache ──────────────────────────────────────────── */
var CK = 'tt_v6';
var TTL = 25 * 60 * 1000;

function saveCache(d) {
  try { localStorage.setItem(CK, JSON.stringify({ts: Date.now(), d: d})); } catch(e) {}
}

function loadCache() {
  try {
    var r = localStorage.getItem(CK);
    if (!r) return null;
    var obj = JSON.parse(r);
    if (Date.now() - obj.ts < TTL) return obj;
    localStorage.removeItem(CK);
  } catch(e) {}
  return null;
}

/* ── Open link (WebIntoApp safe) ────────────────────── */
function openLink(url) {
  if (!url || url.indexOf('http') !== 0) return;
  try {
    var a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    return;
  } catch(e) {}
  try { window.open(url, '_blank'); } catch(e) {}
  try { window.location.href = url; } catch(e) {}
}

/* ── Gemini API call ────────────────────────────────── */
function callGemini(prompt, useSearch, maxTokens) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;
  var body = {
    contents: [{parts: [{text: prompt}]}],
    generationConfig: {temperature: 0.25, maxOutputTokens: maxTokens || 5000}
  };
  if (useSearch) body.tools = [{google_search: {}}];

  return fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function(res) {
    return res.json().then(function(data) {
      if (!res.ok) {
        var msg = (data && data.error && data.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      }
      var parts = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) || [];
      var text = parts.map(function(p){ return p.text || ''; }).join('');
      // Strip markdown fences
      text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
      return text;
    });
  });
}

/* ── Parse JSON from Gemini text ────────────────────── */
function parseItems(text) {
  var match = text.match(/\{[\s\S]*\}/);
  if (!match) return [];
  try {
    var obj = JSON.parse(match[0]);
    return Array.isArray(obj.newsItems) ? obj.newsItems : [];
  } catch(e) {
    // Try to close truncated JSON
    try {
      var fixed = match[0].replace(/,\s*$/, '') + ']}';
      var obj2 = JSON.parse(fixed);
      return Array.isArray(obj2.newsItems) ? obj2.newsItems : [];
    } catch(e2) { return []; }
  }
}

/* ── Delay helper ───────────────────────────────────── */
function delay(ms) {
  return new Promise(function(r){ setTimeout(r, ms); });
}

/* ── Main scan ──────────────────────────────────────── */
function startScan() {
  if (isLoading) return;
  if (!apiKey) { showKeyPanel(true); return; }

  isLoading = true;
  showError('');
  showLoading(true);
  setProgress(5, '第一批搜尋中... (1/3)');
  startProgressTick();

  // Clear old display
  document.getElementById('summaryBox').style.display = 'none';
  document.getElementById('countBadge').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('newsList').innerHTML = '';

  var now = new Date().toLocaleString('zh-TW', {timeZone: 'Asia/Taipei'});

  var p1 = '現在台灣時間：' + now + '。\n' +
    '你是科技新聞編輯。用 Google Search 搜尋過去 24 小時內智慧型手機、平板、穿戴裝置最新消息。\n\n' +
    '【重要規定】：\n' +
    '- 所有中文必須是【繁體中文】，嚴禁簡體字\n' +
    '- 品牌型號保留英文（如 Samsung Galaxy S25）\n\n' +
    '回傳 10 筆熱度最高的新聞，純 JSON 格式，絕對不可加 markdown 符號或說明文字：\n' +
    '{"newsItems":[{"brand":"英文品牌名","titleZh":"繁體中文標題","titleEn":"English subtitle",' +
    '"summary":"繁體摘要2-3句\\n英文1-2 sentences","source":"來源網站","time":"X小時前",' +
    '"url":"https://完整真實網址","score":90}]}\n\n' +
    'url 必須是可點擊的完整 https 網址。score 是熱度 0-100。';

  var items1 = [];

  callGemini(p1, true, 5000)
    .then(function(text) {
      items1 = parseItems(text);
      setProgress(45, '已取得 ' + items1.length + ' 則，搜尋第二批... (2/3)');
      return delay(2500); // Respect free-tier 15 RPM
    })
    .then(function() {
      var used = items1.map(function(n){ return n.titleZh; }).join('；');
      var p2 = '現在台灣時間：' + now + '。\n' +
        '你是科技新聞編輯。用 Google Search 搜尋過去 24 小時內智慧型手機、平板相關最新消息。\n' +
        '以下標題已有，請找不重複的新聞：' + (used || '無') + '\n\n' +
        '【規定】所有中文必須是【繁體中文】，嚴禁簡體字。\n\n' +
        '回傳 10 筆不重複的新聞，純 JSON，不加任何 markdown：\n' +
        '{"newsItems":[{"brand":"英文品牌","titleZh":"繁體標題","titleEn":"English subtitle",' +
        '"summary":"繁體摘要2句\\n英文1句","source":"來源","time":"X小時前",' +
        '"url":"https://完整網址","score":75}]}';

      return callGemini(p2, true, 5000);
    })
    .then(function(text) {
      var items2 = parseItems(text);
      setProgress(75, '整理摘要中... (3/3)');

      // Merge + deduplicate
      var seen = {};
      var all = [];
      [].concat(items1, items2).forEach(function(item) {
        var key = (item.titleZh || item.titleEn || '').trim();
        if (key && !seen[key]) { seen[key] = true; all.push(item); }
      });
      all.sort(function(a,b){ return (b.score||0)-(a.score||0); });

      return delay(1000).then(function(){ return all; });
    })
    .then(function(all) {
      // Summary (no search = fast)
      var heads = all.slice(0,7).map(function(n){ return n.titleZh; }).join('；');
      var sp = '根據以下新聞標題，用【繁體中文】寫 100 字以內的今日科技重點摘要，直接輸出純文字，不加標題或符號：\n' + heads;
      return callGemini(sp, false, 512).then(function(sum) {
        return {newsItems: all, summaryBoard: sum.trim()};
      }).catch(function() {
        return {newsItems: all, summaryBoard: ''};
      });
    })
    .then(function(result) {
      stopProgressTick();
      setProgress(100, '完成！');
      saveCache(result);
      renderData(result);
      showLastUpdate(new Date());
      isLoading = false;
      setTimeout(function(){ showLoading(false); }, 400);
    })
    .catch(function(err) {
      stopProgressTick();
      isLoading = false;
      showLoading(false);
      var msg = err.message || '';
      if (msg.indexOf('API_KEY') >= 0 || msg.indexOf('400') >= 0 || msg.indexOf('key') >= 0) {
        showError('API 金鑰無效，請重新確認並儲存。');
        showKeyPanel(true);
      } else if (msg.indexOf('429') >= 0 || msg.indexOf('quota') >= 0 || msg.indexOf('RESOURCE_EXHAUSTED') >= 0) {
        showError('已達免費版使用上限，請等幾分鐘後再試。');
      } else {
        showError('搜尋失敗：' + msg.slice(0, 100));
      }
      if (document.getElementById('newsList').children.length === 0) showEmpty();
    });
}

/* ── Render news ────────────────────────────────────── */
function renderData(result) {
  var items = (result && result.newsItems) || [];
  var summary = (result && result.summaryBoard) || '';

  // Summary
  var sb = document.getElementById('summaryBox');
  if (summary) {
    document.getElementById('summaryText').textContent = summary;
    sb.style.display = 'block';
    sb.className = 'fadein';
  }

  // Count
  var cb = document.getElementById('countBadge');
  if (items.length > 0) {
    cb.innerHTML = '共 <span>' + items.length + '</span> 則 · 依熱度排序';
    cb.style.display = 'block';
  }

  // Cards
  var list = document.getElementById('newsList');
  list.innerHTML = '';

  if (items.length === 0) { showEmpty(); return; }

  items.forEach(function(item, i) {
    var score = Math.max(0, Math.min(100, item.score || 0));
    var color = score >= 80 ? '#22d3ee' : score >= 55 ? '#67e8f9' : '#164e63';

    var card = document.createElement('article');
    card.className = 'card fadein';
    card.style.animationDelay = Math.min(i * 0.04, 0.8) + 's';

    card.innerHTML =
      '<div class="meta">' +
        '<span class="brand">' + esc(item.brand || '—') + '</span>' +
        '<span class="time">' + esc(item.time || '') + '</span>' +
        '<span class="src">' + esc(item.source || '') + '</span>' +
      '</div>' +
      '<div class="titleZh">' + esc(item.titleZh || '') + '</div>' +
      '<div class="titleEn">' + esc(item.titleEn || '') + '</div>' +
      '<div class="hotrow">' +
        '<div class="hotbar"><div class="hotfill" style="width:' + score + '%;background:' + color + ';"></div></div>' +
        '<span class="hotscore" style="color:' + color + ';font-size:9px;">HOT ' + score + '</span>' +
      '</div>' +
      '<div class="summary">' + esc(item.summary || '') + '</div>' +
      '<button class="linkBtn" onclick="openLink(' + JSON.stringify(item.url || '') + ')">' +
        '查看原文 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
      '</button>';

    list.appendChild(card);
  });
}

/* ── Escape HTML ────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
