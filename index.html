<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TechTerm V4</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    body { background-color: #050505; color: #ecfeff; font-family: 'Courier New', monospace; }
    .progress-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.6); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Terminal: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>,
      Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"></path><path d="m21 2-9.6 9.6"></path><circle cx="7.5" cy="15.5" r="5.5"></circle></svg>,
      Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
      Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>,
      Refresh: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
      ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    };

    function App() {
      const [data, setData] = useState({ summaryBoard: "", newsItems: [] });
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [error, setError] = useState(null);
      
      const [apiKey, setApiKey] = useState('');
      const [isKeySaved, setIsKeySaved] = useState(false);
      const [showKeySettings, setShowKeySettings] = useState(true);

      useEffect(() => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
          setApiKey(savedKey);
          setIsKeySaved(true);
          setShowKeySettings(false);
        }
      }, []);

      const saveApiKey = () => {
        if (!apiKey.trim()) return;
        localStorage.setItem('gemini_api_key', apiKey.trim());
        setIsKeySaved(true);
        setShowKeySettings(false);
        setError(null);
      };

      const removeApiKey = () => {
        localStorage.removeItem('gemini_api_key');
        setApiKey('');
        setIsKeySaved(false);
        setShowKeySettings(true);
        setData({ summaryBoard: "", newsItems: [] });
      };

      useEffect(() => {
        let interval;
        if (loading) {
          setProgress(0);
          interval = setInterval(() => {
            setProgress(prev => (prev < 95 ? prev + Math.random() * 10 : prev));
          }, 400);
        } else {
          setProgress(0);
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [loading]);

      const fetchTechNews = async () => {
        if (!isKeySaved) { 
          setShowKeySettings(true);
          setError("請先輸入並儲存 API Key"); 
          return; 
        }
        setLoading(true); 
        setError(null);

        try {
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          const currentDateTime = new Date().toLocaleString('zh-TW');

          const promptText = `
            Current Time: ${currentDateTime}.
            Task: Use Google Search to find 10 to 12 latest smartphone hardware leaks, rumors, or releases from the PAST 20 HOURS. 
            Output strictly valid JSON (no markdown tags):
            {
              "summaryBoard": "A 100-word critical intelligence brief in Traditional Chinese summarizing the findings.",
              "newsItems": [
                {
                  "brand": "Brand Name",
                  "titleZh": "繁體中文標題",
                  "titleEn": "English Title",
                  "summary": "ZH Summary\\nEN Summary",
                  "source": "Platform/Source",
                  "time": "X hours ago",
                  "url": "Valid FULL URL starting with http or https",
                  "score": 95
                }
              ]
            }
          `;

          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }],
              tools: [{ google_search: {} }]
            })
          });

          if (!response.ok) {
            throw new Error(`連線失敗。請確認金鑰是否有效，或稍後再試。`);
          }

          const resData = await response.json();
          let text = resData.candidates?.[0]?.content?.parts?.[0]?.text || "";
          text = text.replace(/```json/g, '').replace(/```/g, '').trim();
          const parsed = JSON.parse(text);
          setData(parsed);
          setProgress(100);
        } catch (err) {
          setError(err.message || "掃描中斷：發生未知錯誤。");
        } finally {
          setTimeout(() => setLoading(false), 500);
        }
      };

      return (
        <div className="p-4 sm:p-6 max-w-2xl mx-auto pb-20">
          <div className="flex justify-between items-center mb-6 text-[10px] text-cyan-600 font-bold border-b border-cyan-900/30 pb-2">
            <span className="flex items-center gap-2"><Icons.Terminal /> TECH_TERM_V4.1</span>
            <button onClick={() => setShowKeySettings(!showKeySettings)} className="flex items-center gap-1 hover:text-cyan-400">
              <Icons.Key /> {isKeySaved ? 'KEY_LOADED (點此修改)' : 'KEY_REQUIRED'}
            </button>
          </div>

          {/* 輸入金鑰的大面板加回來了 */}
          {showKeySettings && (
            <div className="mb-6 p-4 border border-cyan-800 bg-[#0a0c10] rounded-sm">
              <div className="flex flex-col gap-3">
                <p className="text-xs text-gray-400 font-sans">請貼上您的 Google Gemini API Key：</p>
                <input 
                  type="password" 
                  value={apiKey}
                  onChange={(e) => setApiKey(e.target.value)}
                  placeholder="AIzaSy..." 
                  className="bg-black border border-cyan-900 text-cyan-300 px-4 py-3 text-sm focus:outline-none focus:border-cyan-500 w-full"
                />
                <div className="flex gap-2">
                  <button onClick={saveApiKey} className="flex-1 flex items-center justify-center gap-2 bg-cyan-900/50 text-cyan-300 py-3 text-xs font-bold tracking-widest border border-cyan-800">
                    <Icons.Save /> 儲存金鑰
                  </button>
                  {isKeySaved && (
                    <button onClick={removeApiKey} className="px-5 bg-red-900/20 text-red-400 border border-red-900/50">
                      <Icons.Trash />
                    </button>
                  )}
                </div>
              </div>
            </div>
          )}

          <header className="mb-8 border-l-4 border-cyan-500 pl-4">
            <h1 className="text-4xl font-black text-cyan-400 uppercase tracking-tighter">Mobile Terminal</h1>
            <p className="text-[10px] text-cyan-700 tracking-[0.3em] mt-1">REALTIME_HARDWARE_SCANNER</p>
            
            <button 
              onClick={fetchTechNews}
              disabled={loading || !isKeySaved}
              className={`mt-6 flex items-center justify-center gap-3 py-4 w-full text-sm font-bold border-2 transition-all ${loading || !isKeySaved ? 'bg-gray-900 border-gray-800 text-gray-700' : 'bg-cyan-950/20 border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black'}`}
            >
              <Icons.Refresh className={loading ? "animate-spin" : ""} />
              {loading ? 'ANALYZING GLOBAL DATA...' : 'EXECUTE SCAN'}
            </button>
          </header>

          {error && (
            <div className="bg-red-950/20 border border-red-900/50 p-3 mb-6 text-red-400 text-xs">
              {error}
            </div>
          )}

          {loading && (
            <div className="mb-8">
              <div className="flex justify-between text-[10px] text-cyan-500 mb-1 font-bold">
                <span className="animate-pulse-fast">SCANNING SECTORS...</span>
                <span>{Math.round(progress)}%</span>
              </div>
              <div className="w-full h-3 bg-gray-900 border border-cyan-900 p-0.5">
                <div 
                  className="h-full bg-cyan-500 progress-glow transition-all duration-300"
                  style={{ width: `${progress}%` }}
                ></div>
              </div>
            </div>
          )}

          {data.summaryBoard && !loading && (
            <div className="mb-10 bg-cyan-950/10 border-2 border-dashed border-cyan-800 p-5 relative mt-4">
              <div className="text-[10px] bg-cyan-800 text-black font-bold px-2 py-0.5 absolute -top-3 left-4 tracking-widest">DAILY_BRIEF</div>
              <p className="text-gray-200 text-sm leading-relaxed font-sans">{data.summaryBoard}</p>
            </div>
          )}

          <div className="grid gap-8">
            {data.newsItems.map((item, index) => (
              <article key={index} className="border-b border-gray-800 pb-8">
                <div className="flex flex-wrap gap-2 mb-3">
                  <span className="text-[10px] bg-white text-black px-2 py-0.5 font-bold uppercase">{item.brand}</span>
                  <span className="text-[10px] border border-cyan-800 text-cyan-500 px-2 py-0.5 font-bold uppercase">{item.time}</span>
                  <span className="text-[10px] text-gray-600 ml-auto border border-gray-800 px-2 py-0.5">{item.source}</span>
                </div>
                <h2 className="text-lg font-bold text-gray-100 mb-2 leading-tight">{item.titleZh}</h2>
                <h3 className="text-xs text-cyan-900 font-bold mb-4 uppercase">{item.titleEn}</h3>
                <div className="bg-gray-900/50 p-4 border-l-2 border-gray-700 text-sm text-gray-400 mb-4 whitespace-pre-line leading-relaxed font-sans">
                  {item.summary}
                </div>
                <a 
                  href={item.url} 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center gap-2 text-xs font-bold text-cyan-400 border border-cyan-900 px-4 py-2 hover:bg-cyan-400 hover:text-black transition-all"
                >
                  ACCESS SOURCE <Icons.ExternalLink />
                </a>
              </article>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
