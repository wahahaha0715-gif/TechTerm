<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TechTerm</title>
<style>
:root{
  --bg:#060608;
  --surface:#0d0f14;
  --border:#1a2030;
  --cyan:#22d3ee;
  --cyan-dim:#0e7490;
  --cyan-dark:#082030;
  --text:#e2e8f0;
  --muted:#64748b;
  --faint:#1e293b;
  --red:#ef4444;
  --red-bg:#1a0a0a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Courier New',Courier,monospace;min-height:100%;width:100%}
body{padding:0 0 80px}

/* ── layout ── */
.wrap{max-width:480px;margin:0 auto;padding:16px}

/* ── topbar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.logo{font-size:10px;font-weight:700;color:var(--cyan-dim);letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);display:inline-block;animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.keybtn{font-size:10px;font-weight:700;font-family:inherit;letter-spacing:.06em;border:1px solid var(--border);background:none;color:var(--muted);padding:4px 10px;cursor:pointer}
.keybtn.ok{color:var(--cyan-dim);border-color:var(--cyan-dim)}
.keybtn.bad{color:var(--red);border-color:var(--red)}

/* ── key panel ── */
.keypanel{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:20px;display:none}
.keypanel.show{display:block}
.kp-label{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.kp-hint{font-size:9px;color:var(--faint);margin-bottom:12px}
.kp-hint a{color:var(--cyan-dim)}
.kp-input{width:100%;background:#000;border:1px solid var(--border);color:var(--cyan);padding:12px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;border-radius:0;-webkit-appearance:none}
.kp-input:focus{border-color:var(--cyan-dim)}
.kp-save{width:100%;background:var(--cyan-dark);border:1px solid var(--cyan-dim);color:var(--cyan);padding:11px;font-size:11px;font-family:inherit;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.kp-save:active{background:var(--cyan);color:#000}

/* ── hero ── */
.hero{border-left:3px solid var(--cyan);padding-left:14px;margin-bottom:24px}
.hero h1{font-size:26px;font-weight:900;color:var(--cyan);text-transform:uppercase;letter-spacing:-.02em;line-height:1}
.hero-sub{font-size:9px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.hero-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.scan-btn{display:flex;align-items:center;gap:7px;padding:11px 18px;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.08em;text-transform:uppercase;border:2px solid var(--cyan-dim);color:var(--cyan);background:none;cursor:pointer;transition:all .15s}
.scan-btn:not(:disabled):active{background:var(--cyan);color:#000}
.scan-btn:disabled{border-color:var(--border);color:var(--faint);cursor:not-allowed}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-up{font-size:9px;color:var(--faint);border:1px solid var(--border);padding:5px 10px;display:none}

/* ── progress ── */
.prog-box{display:none;margin-bottom:22px}
.prog-row{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:5px}
.prog-track{width:100%;height:3px;background:var(--faint)}
.prog-fill{height:3px;background:var(--cyan);width:0%;transition:width .6s ease;box-shadow:0 0 8px var(--cyan)}
.prog-hint{font-size:9px;color:var(--border);margin-top:5px}

/* ── error ── */
.err-box{display:none;background:var(--red-bg);border:1px solid var(--red);color:var(--red);font-size:12px;padding:12px 14px;margin-bottom:18px;line-height:1.5}

/* ── summary ── */
.summary-box{display:none;background:var(--surface);border:1px solid var(--border);padding:14px;margin-bottom:24px}
.summary-label{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-size:13px;color:#94a3b8;line-height:1.7;font-family:system-ui,sans-serif}

/* ── count ── */
.count{display:none;font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.count b{color:var(--cyan)}

/* ── cards ── */
.cards{display:flex;flex-direction:column;gap:0}
.card{border-bottom:1px solid var(--border);padding:20px 0;animation:fadein .3s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.brand-tag{background:var(--text);color:var(--bg);font-size:9px;font-weight:900;padding:2px 7px;letter-spacing:.04em;text-transform:uppercase}
.time-tag{border:1px solid var(--border);color:var(--muted);font-size:9px;padding:2px 7px}
.src-tag{font-size:9px;color:var(--faint);margin-left:auto;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.title-zh{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:2px}
.title-en{font-size:9px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.hot-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.hot-track{flex:1;height:1px;background:var(--faint)}
.hot-fill{height:1px}
.hot-label{font-size:9px;font-weight:700;white-space:nowrap}
.card-summary{font-size:13px;color:#64748b;line-height:1.65;white-space:pre-line;font-family:system-ui,sans-serif;margin-bottom:14px}
.link-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;font-family:inherit;color:var(--cyan-dim);border:1px solid var(--border);padding:8px 14px;background:none;cursor:pointer;letter-spacing:.04em}
.link-btn:active{background:var(--cyan);color:#000;border-color:var(--cyan)}

/* ── empty ── */
.empty{display:none;text-align:center;padding:64px 0;font-size:10px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}

::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:var(--faint)}
</style>
</head>
<body>
<div class="wrap">

  <!-- topbar -->
  <div class="topbar">
    <div class="logo"><span class="dot"></span>TECH_TERM_V7</div>
    <button class="keybtn bad" id="keyBtn" onclick="toggleKey()">⚿ KEY_MISSING</button>
  </div>

  <!-- key panel -->
  <div class="keypanel" id="keyPanel">
    <div class="kp-label">Gemini API Key（免費版）</div>
    <div class="kp-hint">取得金鑰：<a href="#" onclick="openLink('https://aistudio.google.com/apikey')">aistudio.google.com/apikey</a></div>
    <input class="kp-input" id="keyInput" type="password" placeholder="AIzaSy..." autocomplete="off">
    <button class="kp-save" onclick="saveKey()">儲存並開始掃描</button>
  </div>

  <!-- hero -->
  <div class="hero">
    <h1>Mobile<br>Terminal</h1>
    <div class="hero-sub">手機科技情報站 · 繁體中文</div>
    <div class="hero-row">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">
        <svg id="scanIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span id="scanTxt">重新掃描</span>
      </button>
      <div class="last-up" id="lastUp"></div>
    </div>
  </div>

  <!-- progress -->
  <div class="prog-box" id="progBox">
    <div class="prog-row"><span id="progMsg">初始化...</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-hint">分批搜尋，免費版約需 40–90 秒，請稍候</div>
  </div>

  <!-- error -->
  <div class="err-box" id="errBox"></div>

  <!-- summary -->
  <div class="summary-box" id="sumBox">
    <div class="summary-label">今日重點摘要</div>
    <div class="summary-text" id="sumText"></div>
  </div>

  <!-- count -->
  <div class="count" id="countEl"></div>

  <!-- cards -->
  <div class="cards" id="cards"></div>

  <!-- empty -->
  <div class="empty" id="empty">尚無資料，點擊重新掃描</div>

</div>

<script>
// ── state ────────────────────────────────────────────
var KEY_STORE = 'tt7_key';
var CACHE_STORE = 'tt7_cache';
var CACHE_TTL = 25 * 60 * 1000;
var busy = false;
var progTimer = null;
var progVal = 0;

// ── boot ────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var k = ls(KEY_STORE);
  if (k) {
    setKeyUI(k);
    var hit = getCache();
    if (hit) { render(hit); return; }
    startScan();
  } else {
    show('keyPanel');
    show('empty');
  }
});

// ── localStorage safe ────────────────────────────────
function ls(k){ try{ return localStorage.getItem(k) || ''; }catch(e){ return ''; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }

// ── cache ────────────────────────────────────────────
function setCache(d){ lsSet(CACHE_STORE, JSON.stringify({ts:Date.now(),d:d})); }
function getCache(){
  try{
    var raw = ls(CACHE_STORE);
    if(!raw) return null;
    var o = JSON.parse(raw);
    if(Date.now()-o.ts < CACHE_TTL) return o.d;
    lsDel(CACHE_STORE);
  }catch(e){}
  return null;
}

// ── show/hide ────────────────────────────────────────
function show(id){ document.getElementById(id).style.display=''; }
function hide(id){ document.getElementById(id).style.display='none'; }
function el(id){ return document.getElementById(id); }

// ── key helpers ──────────────────────────────────────
function toggleKey(){
  var p = el('keyPanel');
  p.classList.toggle('show');
}
function setKeyUI(k){
  var b = el('keyBtn');
  if(k){ b.className='keybtn ok'; b.textContent='⚿ KEY_OK'; }
  else { b.className='keybtn bad'; b.textContent='⚿ KEY_MISSING'; }
}
function saveKey(){
  var v = el('keyInput').value.trim();
  if(!v) return;
  lsSet(KEY_STORE, v);
  setKeyUI(v);
  el('keyPanel').classList.remove('show');
  setErr('');
  hide('empty');
  startScan();
}

// ── progress ─────────────────────────────────────────
function setP(pct, msg){
  progVal = pct;
  el('progFill').style.width = pct+'%';
  el('progPct').textContent = Math.round(pct)+'%';
  if(msg) el('progMsg').textContent = msg;
}
function tickP(){
  clearInterval(progTimer);
  progTimer = setInterval(function(){
    if(progVal < 82){ progVal += (82-progVal)*0.025; el('progFill').style.width=progVal+'%'; el('progPct').textContent=Math.round(progVal)+'%'; }
  }, 600);
}
function stopP(){ clearInterval(progTimer); }

// ── error ─────────────────────────────────────────────
function setErr(msg){
  var b = el('errBox');
  if(msg){ b.textContent='⚠ '+msg; b.style.display='block'; }
  else { b.style.display='none'; }
}

// ── open link ─────────────────────────────────────────
function openLink(url){
  if(!url||url.indexOf('http')!==0) return;
  try{ var a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener noreferrer'; document.body.appendChild(a); a.click(); document.body.removeChild(a); return; }catch(e){}
  try{ window.open(url,'_blank'); }catch(e){}
}

// ── html escape ───────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Gemini fetch ──────────────────────────────────────
function callAPI(prompt, useSearch, maxTok){
  var k = ls(KEY_STORE);
  if(!k) return Promise.reject(new Error('NO_KEY'));
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+k;
  var body = {
    contents:[{parts:[{text:prompt}]}],
    generationConfig:{temperature:0.25, maxOutputTokens: maxTok||5000}
  };
  if(useSearch) body.tools=[{google_search:{}}];
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){
      return r.json().then(function(d){
        if(!r.ok) throw new Error((d&&d.error&&d.error.message)||('HTTP '+r.status));
        var parts=(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts)||[];
        var txt=parts.map(function(p){return p.text||'';}).join('');
        return txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      });
    });
}

// ── parse JSON items ──────────────────────────────────
function parseItems(txt){
  var m=txt.match(/\{[\s\S]*\}/);
  if(!m) return [];
  try{ var o=JSON.parse(m[0]); return Array.isArray(o.newsItems)?o.newsItems:[]; }catch(e){}
  try{ var o2=JSON.parse(m[0].replace(/,\s*$/,'')+']}'); return Array.isArray(o2.newsItems)?o2.newsItems:[]; }catch(e){}
  return [];
}

function wait(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

// ── prompt builder ────────────────────────────────────
function buildPrompt(exclude){
  var now = new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  var ex = exclude && exclude.length ? '以下標題已存在，請找不重複的：'+exclude.join('；')+'\n\n' : '';
  return '現在台灣時間：'+now+'。你是科技新聞編輯，任務是搜尋並整理最新手機科技資訊。\n'+
    ex+
    '【絕對規定】所有中文必須使用繁體中文，嚴禁任何簡體字。品牌型號保留英文。\n\n'+
    '請用 Google Search 搜尋過去 24 小時內智慧型手機、平板、穿戴裝置最新消息（規格洩漏、新品發布、評測、韌體更新等）。\n\n'+
    '回傳 10 筆新聞。僅輸出純 JSON，不加任何說明文字、不加 markdown 符號：\n'+
    '{"newsItems":[{"brand":"英文品牌","titleZh":"繁體標題","titleEn":"English subtitle","summary":"繁體摘要2-3句\\n英文1-2句","source":"來源網站","time":"X小時前","url":"https://完整網址","score":85}]}\n\n'+
    'score=熱度0-100，url必須是完整https網址。';
}

// ── main scan ─────────────────────────────────────────
function startScan(){
  if(busy) return;
  var k = ls(KEY_STORE);
  if(!k){ el('keyPanel').classList.add('show'); return; }
  busy=true;

  // reset UI
  setErr('');
  el('sumBox').style.display='none';
  el('countEl').style.display='none';
  el('empty').style.display='none';
  el('cards').innerHTML='';
  el('progBox').style.display='block';
  el('scanBtn').disabled=true;
  el('scanIcon').classList.add('spin');
  el('scanTxt').textContent='掃描中...';
  setP(5,'第一批搜尋中... (1/3)');
  tickP();

  var items1=[], items2=[];

  callAPI(buildPrompt([]), true, 5000)
    .then(function(txt){
      items1 = parseItems(txt);
      setP(40,'已取得 '+items1.length+' 則，搜尋第二批... (2/3)');
      return wait(2800);
    })
    .then(function(){
      var used = items1.map(function(n){return n.titleZh||'';}).filter(Boolean);
      return callAPI(buildPrompt(used), true, 5000);
    })
    .then(function(txt){
      items2 = parseItems(txt);
      setP(72,'整理資料中... (3/3)');
      return wait(1200);
    })
    .then(function(){
      // merge + dedup
      var seen={}, all=[];
      [].concat(items1,items2).forEach(function(item){
        var key=(item.titleZh||item.titleEn||'').trim();
        if(key&&!seen[key]){ seen[key]=true; all.push(item); }
      });
      all.sort(function(a,b){return (b.score||0)-(a.score||0);});

      // summary (no search = fast)
      var heads=all.slice(0,7).map(function(n){return n.titleZh||'';}).filter(Boolean).join('；');
      var sp='根據以下新聞標題，用繁體中文寫 100 字以內的今日科技重點摘要，直接輸出純文字，不加標題或標點符號以外的任何格式：\n'+heads;
      return callAPI(sp, false, 600)
        .then(function(sum){ return {newsItems:all, summaryBoard:sum.trim()}; })
        .catch(function(){ return {newsItems:all, summaryBoard:''}; });
    })
    .then(function(result){
      stopP(); setP(100,'完成！');
      setCache(result);
      render(result);
      var now2=new Date();
      var h=('0'+now2.getHours()).slice(-2), m=('0'+now2.getMinutes()).slice(-2);
      el('lastUp').textContent='更新 '+h+':'+m;
      el('lastUp').style.display='';
      done(false);
    })
    .catch(function(err){
      stopP();
      done(false);
      var msg=err.message||'';
      if(msg==='NO_KEY'||msg.indexOf('API_KEY')>=0||msg.indexOf('key')>=0||msg.indexOf('400')>=0){
        setErr('API 金鑰無效，請重新輸入並儲存。');
        el('keyPanel').classList.add('show');
      } else if(msg.indexOf('429')>=0||msg.indexOf('quota')>=0||msg.indexOf('EXHAUSTED')>=0){
        setErr('已達免費版使用上限（每分鐘限制），請等幾分鐘後再試。');
      } else if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0){
        setErr('網路連線失敗，請確認網路後重試。');
      } else {
        setErr('搜尋失敗：'+msg.slice(0,120));
      }
      if(!el('cards').children.length) el('empty').style.display='';
    });
}

function done(loading){
  busy=loading;
  el('progBox').style.display=loading?'block':'none';
  el('scanBtn').disabled=loading;
  el('scanIcon').classList.toggle('spin',loading);
  el('scanTxt').textContent=loading?'掃描中...':'重新掃描';
}

// ── render ────────────────────────────────────────────
function render(result){
  var items=(result&&result.newsItems)||[];
  var sum=(result&&result.summaryBoard)||'';

  if(sum){
    el('sumText').textContent=sum;
    el('sumBox').style.display='';
  }
  if(items.length){
    el('countEl').innerHTML='共 <b>'+items.length+'</b> 則 · 依熱度排序';
    el('countEl').style.display='';
  }

  var frag=document.createDocumentFragment();
  items.forEach(function(item,i){
    var s=Math.max(0,Math.min(100,item.score||0));
    var c=s>=80?'#22d3ee':s>=55?'#67e8f9':'#1e3a4a';

    var card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=Math.min(i*.04,.7)+'s';
    card.innerHTML=
      '<div class="card-meta">'+
        '<span class="brand-tag">'+esc(item.brand||'—')+'</span>'+
        '<span class="time-tag">'+esc(item.time||'')+'</span>'+
        '<span class="src-tag">'+esc(item.source||'')+'</span>'+
      '</div>'+
      '<div class="title-zh">'+esc(item.titleZh||'')+'</div>'+
      '<div class="title-en">'+esc(item.titleEn||'')+'</div>'+
      '<div class="hot-row">'+
        '<div class="hot-track"><div class="hot-fill" style="width:'+s+'%;background:'+c+'"></div></div>'+
        '<span class="hot-label" style="color:'+c+'">HOT '+s+'</span>'+
      '</div>'+
      '<div class="card-summary">'+esc(item.summary||'')+'</div>'+
      '<button class="link-btn" onclick="openLink('+JSON.stringify(item.url||'')+')">'+'查看原文 ↗'+'</button>';
    frag.appendChild(card);
  });
  el('cards').appendChild(frag);
  if(!items.length) el('empty').style.display='';
}
</script>
</body>
</html>
